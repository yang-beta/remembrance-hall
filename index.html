<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洸限 思念終結館 — 沉浸式留言板</title>
    <!-- 引入思念風格字體與圖示 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- 引入外部樣式表 -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 引入 html2canvas 與 Supabase SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wrapper">
        <!-- 頂部展館主題 -->
        <header>
            <h1>洸限</h1>
            <p>XUAN XIAN • Resonance of Absence / 2026</p>
        </header>

        <div class="grid-layout">
            <!-- 輸入表單 -->
            <div class="input-card">
                <div class="form-group">
                    <label>思念的對象</label>
                    <div class="target-selector">
                        <button class="target-btn active" onclick="setTarget('relative', this)">
                            <i class="fa-solid fa-hands-holding-child"></i>
                            <span>親人</span>
                        </button>
                        <button class="target-btn" onclick="setTarget('friend', this)">
                            <i class="fa-solid fa-user-group"></i>
                            <span>朋友</span>
                        </button>
                        <button class="target-btn" onclick="setTarget('pet', this)">
                            <i class="fa-solid fa-paw"></i>
                            <span>寵物</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nickname">如何稱呼他/她/牠？</label>
                    <input type="text" id="nickname" placeholder="例如：外婆、老友小宇、橘貓咪咪">
                </div>

                <div class="form-group">
                    <label for="memory">腦海中第一個浮現的畫面或細節</label>
                    <textarea id="memory" rows="3" placeholder="例如：廚房裡的飯菜香、一同看海的下午、在腳邊呼嚕嚕的溫度"></textarea>
                </div>

                <button class="btn-submit" onclick="generateRemembrance()">⚡ 生成思念儀式卡片</button>
            </div>

            <!-- 精美卡片展示區 -->
            <div class="output-section" id="output-section">
                <div class="card-container" id="printable-card">
                    <div class="card-header">
                        <span class="card-tag" id="card-tag-display">思念致意錄 / 親人</span>
                        <span class="card-icon" id="card-icon-display"><i class="fa-solid fa-hands-holding-child"></i></span>
                    </div>
                    
                    <div class="card-body">
                        <div class="card-quote" id="card-text-display">
                            記憶中的細節，如同不滅的光亮，溫柔地照亮往後的路。
                        </div>
                        <div class="card-sign" id="card-sign-display">
                            — 致 外婆
                        </div>
                    </div>

                    <div class="card-footer">
                        <span class="card-date" id="card-date-display">2026.07.13</span>
                        <span class="card-brand">洸限 GUANG</span>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn-action download" onclick="downloadCard()"><i class="fa-solid fa-download"></i> 儲存美學卡片 (PNG)</button>
                </div>
            </div>
        </div>

        <!-- 歷史留言牆 -->
        <div class="wall-section">
            <div class="wall-header-wrapper">
                <h2><i class="fa-solid fa-feather-pointed"></i> 留白處 — 大家留下的思念痕跡</h2>
                <div class="slider-arrows">
                    <button class="arrow-btn" onclick="slideWall('left')"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="arrow-btn" onclick="slideWall('right')"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            
            <!-- 橫向滑動視窗容器 -->
            <div class="slider-container" id="slider-container">
                <div class="wall-grid-row" id="wall-grid">
                    <div style="text-align: center; color: var(--text-muted); padding: 30px; width: 100%;">
                        正在開啟思念終點館通道...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入外部邏輯腳本 -->
   <!-- 1. 引入 Google AI Gemini 官方瀏覽器專用 SDK 檔案 -->
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.2.1/dist/index.umd.min.js"></script>
    
    <!-- 2. 引入你的外部邏輯腳本 (加上 defer 確保乖乖排隊執行) -->
    <script src="app.js" defer></script>
    
</body>
</html>

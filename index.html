<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洸限</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="data:,">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animation.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <canvas id="mandalaCanvas"></canvas>

    <!--  前台全螢幕 Banner 圖層 -->
    <div class="hero-container">
        <button class="skip-anim-btn" onclick="scrollToContent()">Skip 略過動畫 ✕</button>

        <!-- ==========================================================
             🖼️ 【未來展覽主視覺橫幅海報 ── 放置與替換位置】
             ========================================================== -->
        <!--
        <div class="main-banner-poster">
            <img src="images/your-exhibition-banner.png" alt="洸限 展覽主視覺海報" />
        </div>
        -->
        <!-- ========================================================== -->
        
        <h1 class="brand-title">洸限</h1>
        <p class="main-question">如果還有一次機會，你最想告訴他/她/牠什麼？</p>
        
        <div class="scroll-hint" onclick="scrollToContent()">
            <span class="arrow">↓</span>
        </div>
    </div>
    <!-- 第二階段：留言板卡片 (獨立 100vh 全畫面) -->
    <div class="wrapper" id="main-content">
        <header>
            <h1>洸限</h1>
            <p>for<span style="color:silver">Ever</span> Cher<span style="color:silver">ich</span></p>
        </header>

        <div class="grid-layout">
            <div class="input-card">
                <div class="form-group">
                    <label>思念的對象</label>
                    <div class="target-selector">
                        <button class="target-btn active" onclick="setTarget('relative', this)">
                            <i class="fa-solid fa-hands-holding-child"></i>
                            <span>親人</span>
                        </button>
                        <button class="target-btn" onclick="setTarget('friend', this)">
                            <i class="fa-solid fa-user-group"></i>
                            <span>朋友</span>
                        </button>
                        <button class="target-btn" onclick="setTarget('pet', this)">
                            <i class="fa-solid fa-paw"></i>
                            <span>寵物</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nickname">如何稱呼他/她/牠？</label>
                    <input type="text" id="nickname" placeholder="例如：外婆、老友小宇、橘貓咪咪">
                </div>

                <div class="form-group">
                    <label for="memory">最想說的一句話/腦海中浮現的第一個的畫面</label>
                    <textarea id="memory" rows="3" placeholder="例如：廚房裡的飯菜香、一同看海的下午、在腳邊呼嚕嚕的溫度"></textarea>
                </div>

                <button class="btn-submit" onclick="generateRemembrance()">⚡ 生成思念回憶卡片</button>
            </div>
        </div>
            
        <!-- 🎯 全螢幕重逢 Modal 保持原位 -->
        <div class="output-section" id="output-section">
            <button class="close-modal-btn" onclick="closeReunionModal()">✕ 關閉</button>
            <div class="card-container" id="printable-card">
                <div class="card-header">
                    <span class="card-tag" id="card-tag-display">思念回憶錄 / 親人</span>
                    <span class="card-icon" id="card-icon-display"><i class="fa-solid fa-hands-holding-child"></i></span>
                </div>
                <div class="card-body">
                    <div class="card-quote" id="card-text-display">
                        記憶中的細節，如同不滅的光亮，溫柔地照亮往後的路。
                    </div>
                    <div class="card-sign" id="card-sign-display">
                        — 致 外婆
                    </div>
                </div>
                <div class="card-footer">
                    <span class="card-date" id="card-date-display">2026.07.13</span>
                    <span class="card-brand">洸限</span>
                </div>
            </div>
            
            <div class="card-actions">
                <button class="btn-action download" onclick="downloadCard()"><i class="fa-solid fa-download"></i> 儲存回憶卡片</button>
                <button class="btn-action release" id="release-btn" onclick="releaseCardAndFly()">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 釋懷，放手執著
                </button>
            </div>
        </div>
    </div> <!-- 🎯 讓 wrapper 在這裡精準結束 -->

    <!-- 第三階段：思念留言牆 (獨立 100vh 全畫面，移到外層排列) -->
    <div class="wall-section" id="wall-section-container">
        <div class="wall-header-wrapper">
            <h2><i class="fa-solid fa-feather-pointed"></i> 留白處 — 大家留下的思念痕跡</h2>
        </div>
        
        <button class="edge-arrow-btn left" onclick="slideWall('left')">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="edge-arrow-btn right" onclick="slideWall('right')">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div class="slider-container" id="slider-container">
            <div class="wall-grid-row" id="wall-grid">
                <div style="text-align: center; color: var(--text-muted); padding: 30px; width: 100%;">
                    正在開啟思念終點館通道...
                </div>
            </div>
        </div>
    </div>

    <!-- 第四階段：落幕結尾文字 (獨立 100vh 全畫面) -->
    <div class="exhibition-outro-section" id="outro-section">
        <div class="outro-content">
            <p class="outro-text" id="typewriter-text"></p>
            <p class="outro-brand" id="typewriter-sub"></p>
        </div>
        <div id="outro-align-anchor" style="position: absolute; bottom: 0; left: 0; width: 1px; height: 1px; pointer-events: none;"></div>
    </div>
    
    
    <!-- 🎯 載入腳本路徑 -->
    <script src="js/canvas.js"></script>
    <script src="js/app.js" type="module"></script>
    
    <script>
        // 確保留過動畫時能精準滑動到獨立滿版的主表單正起點
        function scrollToContent() {
            // 如果進場動畫還在跑，直接叫全域的完結函式處理
            if (window.scrollToContent) {
                window.scrollToContent();
            } else {
                document.getElementById('main-content').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    </script>
</body>
</html>
